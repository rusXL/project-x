apiVersion: core.pingcap.com/v1alpha1
kind: TiDBGroup
metadata:
  name: tidb
  namespace: db
spec:
  cluster:
    name: basic
  replicas: 2
  template:
    metadata:
      annotations:
        author: pingcap
    spec:
      version: v8.5.2
      overlay:
        pod:
          spec:
            containers:
            - name: tidb
              resources:
                requests:
                  cpu: "400m"
                  memory: "400Mi"
                limits:
                  cpu: "750m"
                  memory: "768Mi"
