apiVersion: core.pingcap.com/v1alpha1
kind: TiKVGroup
metadata:
  name: tikv
  namespace: db
spec:
  cluster:
    name: basic
  replicas: 1 # 3
  template:
    metadata:
      annotations:
        author: pingcap
    spec:
      version: v8.5.2
      resources:
        limits:
          memory: "1500Mi"
          cpu: "1"
        requests:
          memory: "1Gi"
          cpu: "500m"
      volumes:
      - name: data
        mounts:
        - type: data
        storage: 1Gi # TODO: change to 10Gi
        storageClassName: gp3
