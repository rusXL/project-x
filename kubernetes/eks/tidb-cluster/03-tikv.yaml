apiVersion: core.pingcap.com/v1alpha1
kind: TiKVGroup
metadata:
  name: tikv
  namespace: db
spec:
  cluster:
    name: basic
  replicas: 1 # 3
  template:
    metadata:
      annotations:
        author: pingcap
    spec:
      version: v8.5.2
      volumes:
      - name: data
        mounts:
        - type: data
        storage: 1Gi # TODO: change to 10Gi
        storageClassName: gp3
      overlay:
        pod:
          spec:
            containers:
            - name: tikv
              resources:
                limits:
                  cpu: "1"
                  memory: "3Gi"
                requests:
                  cpu: "500m"
                  memory: "2Gi"
