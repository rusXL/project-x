apiVersion: core.pingcap.com/v1alpha1
kind: TiKVGroup
metadata:
  name: tikv
  namespace: db
spec:
  cluster:
    name: basic
  replicas: 3
  template:
    metadata:
      annotations:
        author: pingcap
    spec:
      version: v8.5.2
      volumes:
      - name: data
        mounts:
        - type: data
        storage: 10Gi
        storageClassName: gp3
      overlay:
        pod:
          spec:
            containers:
            - name: tikv
              resources:
                limits:
                  cpu: "1"
                  memory: "2560Mi"
                requests:
                  cpu: "500m"
                  memory: "1280Mi"
