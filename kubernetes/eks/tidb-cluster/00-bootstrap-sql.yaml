apiVersion: v1
kind: ConfigMap
metadata:
  name: basic
  namespace: db
data:
  bootstrap-sql: |
    CREATE DATABASE IF NOT EXISTS `agama`;

    CREATE TABLE IF NOT EXISTS `agama`.`items` (
      `id` BIGINT NOT NULL AUTO_RANDOM(3),
      `value` VARCHAR(255) NOT NULL,
      `state` INT NOT NULL DEFAULT 0,
      PRIMARY KEY (`id`) CLUSTERED,
      UNIQUE KEY `ix_value` (`value`)
    ) PRE_SPLIT_REGIONS = 3;

    ALTER TABLE `agama`.`items` ATTRIBUTES 'merge_option=deny';

    SET GLOBAL tidb_replica_read = 'leader-and-follower';
