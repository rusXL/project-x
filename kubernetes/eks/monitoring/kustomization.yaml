resources:
  - 01-servicemonitor-api.yaml
  - 02-ingress.yaml
  - 03-podmonitor-tidb.yaml

configMapGenerator:
  - name: api-dashboard
    namespace: monitoring
    files:
      - dashboards/api-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: k6-dashboard
    namespace: monitoring
    files:
      - dashboards/k6-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: tidb-overview-dashboard
    namespace: monitoring
    files:
      - dashboards/tidb/tidb-overview.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: tidb-summary-dashboard
    namespace: monitoring
    files:
      - dashboards/tidb/tidb-summary.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: tikv-summary-dashboard
    namespace: monitoring
    files:
      - dashboards/tidb/tikv-summary.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: pd-dashboard
    namespace: monitoring
    files:
      - dashboards/tidb/tidb-pd.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
