apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: agama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: rusxl/agama-api:cd1cf2d8d5ed554181a911552a7f0849af6dce3d
          ports:
            - name: http
              containerPort: 8000
          env:
            # TODO: Secret/ConfigMap later
            - name: DATABASE_URL
              value: "mysql+aiomysql://root:@tidb.db.svc.cluster.local:4000/agama"
            - name: ALLOWED_ORIGINS
              value: '["*"]'
            - name: APP_NAME
              value: "AGAMA"
          # TODO: resources, probes
