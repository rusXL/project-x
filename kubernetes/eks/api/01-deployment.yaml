apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: agama
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: api
              topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: rusxl/agama-api:e93a284da34e3fe664d2b4517f5c3a808c991786
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "mysql+aiomysql://root:@tidb.db.svc.cluster.local:4000/agama"
            - name: ALLOWED_ORIGINS
              value: '["*"]'
            - name: APP_NAME
              value: "AGAMA"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
