apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: agama
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: rusxl/agama-api:d542bbcbaf209aa321e1c7c9ed76f6d0771cdaa1
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "mysql+aiomysql://root:@tidb.db.svc.cluster.local:4000/agama"
            - name: ALLOWED_ORIGINS
              value: '["*"]'
            - name: APP_NAME
              value: "AGAMA"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
