apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: rusXL/agama-api:latest
          ports:
            - containerPort: 8000
          env:
            # TODO: Secret/ConfigMap later
            - name: DATABASE_URL
              value: "mysql+pymysql://root:password@mysql:3306/agama"
            - name: ALLOWED_ORIGINS
              value: '["*"]'
            - name: APP_NAME
              value: "AGAMA"
          # TODO: resources, probes
