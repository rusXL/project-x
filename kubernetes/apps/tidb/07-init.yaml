apiVersion: batch/v1
kind: Job
metadata:
  name: tidb-init
  namespace: db
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: mysql:8
          command:
            - sh
            - -c
            - |
              until mysql -u root -h tidb -P 4000 -e "SELECT 1" > /dev/null 2>&1; do
                echo "Waiting for TiDB..."
                sleep 5
              done
              mysql -u root -h tidb -P 4000 -e "CREATE DATABASE IF NOT EXISTS agama;"
              echo "Done."
              