configMapGenerator:
  - name: api-dashboard
    namespace: monitoring
    files:
      - api-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: k6-dashboard
    namespace: monitoring
    files:
      - k6-dashboard.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
  - name: tidb-cluster-dashboard
    namespace: monitoring
    files:
      - tidb-cluster.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
