name: Frontend

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend.yml']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Dependencies
        run: |
          cd frontend
          npm ci

      - name: Formatting check
        run: |
          cd frontend
          npx prettier --check .

      - name: Lint check
        run: |
          cd frontend
          npx eslint .

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: rusxl
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Hub build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: rusxl/agama-frontend:${{ github.sha }}
