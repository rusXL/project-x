name: API

on:
  push:
    branches: [main]
    paths: ['api/**']

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies
        run: |
          cd api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Formatting
        run: |
          cd api
          ruff format .

      - name: Linting
        run: |
          cd api
          ruff check . --fix

      - name: Style changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with ruff"

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: rusxl
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Hub build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: rusxl/agama-api:${{ github.sha }}

      - name: Update deployment manifest
        run: |
          sed -i "s|image: rusxl/agama-api:.*|image: rusxl/agama-api:${{ github.sha }}|g" kubernetes/api/deployment.yaml

      - name: Deployment changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci(api): update image tag to ${{ github.sha }}"
          